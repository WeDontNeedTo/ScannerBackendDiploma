openapi: 3.0.3
info:
  title: Diploma Backend Inventory API
  version: 1.0.0
servers:
  - url: http://localhost:8080
security:
  - bearerAuth: []

paths:
  /dashboard:
    get:
      summary: Get dashboard widgets
      responses:
        "200":
          description: Dashboard widgets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardResponse"
        "401":
          description: Unauthorized

  /items:
    get:
      summary: List items
      responses:
        "200":
          description: Items list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Item"
        "401":
          description: Unauthorized
    post:
      summary: Create item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateItemRequest"
      responses:
        "200":
          description: Created item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"
        "400":
          description: Invalid payload
        "401":
          description: Unauthorized
        "404":
          description: Category or responsible user not found

  /items/available_filters:
    get:
      summary: List available item filters
      responses:
        "200":
          description: Available filters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemAvailableFiltersResponse"
        "401":
          description: Unauthorized

  /items/search:
    get:
      summary: Search items by query params
      parameters:
        - $ref: "#/components/parameters/Query"
        - $ref: "#/components/parameters/Name"
        - $ref: "#/components/parameters/Number"
        - $ref: "#/components/parameters/ResponsibleUserIDQuery"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Per"
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ItemScanResponse"
        "400":
          description: Invalid query
        "401":
          description: Unauthorized
    post:
      summary: Search items by request body
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItemSearchQuery"
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ItemScanResponse"
        "400":
          description: Invalid query
        "401":
          description: Unauthorized

  /items/{itemID}:
    get:
      summary: Get full item details by ID
      parameters:
        - $ref: "#/components/parameters/ItemID"
      responses:
        "200":
          description: Full item details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemScanResponse"
        "400":
          description: Invalid itemID
        "401":
          description: Unauthorized
        "404":
          description: Item not found
    put:
      summary: Update item by ID
      parameters:
        - $ref: "#/components/parameters/ItemID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateItemRequest"
      responses:
        "200":
          description: Updated item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"
        "400":
          description: Invalid payload
        "401":
          description: Unauthorized
        "404":
          description: Item, category, or responsible user not found
    delete:
      summary: Delete item by ID
      parameters:
        - $ref: "#/components/parameters/ItemID"
      responses:
        "204":
          description: Deleted
        "400":
          description: Invalid itemID
        "401":
          description: Unauthorized
        "404":
          description: Item not found

  /items/{itemID}/journal:
    get:
      summary: Get item change journal
      parameters:
        - $ref: "#/components/parameters/ItemID"
        - $ref: "#/components/parameters/JournalPage"
        - $ref: "#/components/parameters/JournalPer"
      responses:
        "200":
          description: Item journal messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemJournalPageResponse"
        "400":
          description: Invalid query params
        "401":
          description: Unauthorized
        "404":
          description: Item not found

  /items/{itemID}/available_actions:
    get:
      summary: Get available item actions for current user
      parameters:
        - $ref: "#/components/parameters/ItemID"
      responses:
        "200":
          description: Available actions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemAvailableActionsResponse"
        "400":
          description: Invalid itemID
        "401":
          description: Unauthorized
        "404":
          description: Item not found

  /items/{itemID}/location:
    post:
      summary: Assign item location
      parameters:
        - $ref: "#/components/parameters/ItemID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetItemLocationRequest"
      responses:
        "200":
          description: Item location
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemLocation"
        "400":
          description: Invalid payload
        "401":
          description: Unauthorized
        "403":
          description: Forbidden (direct change allowed only for current responsible user, accountant, or admin)
        "404":
          description: Item, location, or responsible user not found

  /items/{itemID}/location-request:
    post:
      summary: Create location change request
      parameters:
        - $ref: "#/components/parameters/ItemID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateItemLocationRequestPayload"
      responses:
        "200":
          description: Created or existing location request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemLocationRequest"
        "400":
          description: Invalid payload
        "401":
          description: Unauthorized
        "404":
          description: Item, location, or approver not found
        "409":
          description: Conflict (user can change location directly)

  /item-location-requests/incoming:
    get:
      summary: Incoming location requests for accountant/admin
      responses:
        "200":
          description: Incoming location requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ItemLocationRequest"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /item-location-requests/{requestID}/approve:
    post:
      summary: Approve location request
      parameters:
        - $ref: "#/components/parameters/RequestID"
      responses:
        "200":
          description: Approved location request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemLocationRequest"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Location request, item, or location not found
        "409":
          description: Request already processed

  /inventory-requests/drafts:
    post:
      summary: Create inventory request draft
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInventoryRequestDraftPayload"
      responses:
        "200":
          description: Created inventory request draft
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryRequestResponse"
        "400":
          description: Invalid payload
        "401":
          description: Unauthorized
        "403":
          description: Forbidden (accountant/admin only)
        "404":
          description: Materially responsible user not found

  /inventory-requests/incoming:
    get:
      summary: Incoming inventory requests for materially responsible user
      responses:
        "200":
          description: Submitted inventory requests assigned to current user
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InventoryRequestResponse"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /inventory-requests/mine:
    get:
      summary: Inventory requests created by current accountant
      responses:
        "200":
          description: Inventory requests created by current user
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InventoryRequestResponse"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /inventory-requests/{requestID}:
    get:
      summary: Get inventory request details
      parameters:
        - $ref: "#/components/parameters/RequestID"
      responses:
        "200":
          description: Inventory request details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryRequestResponse"
        "400":
          description: Invalid requestID
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Inventory request not found

  /inventory-requests/{requestID}/items:
    put:
      summary: Set selected items for inventory draft
      parameters:
        - $ref: "#/components/parameters/RequestID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateInventoryRequestItemsPayload"
      responses:
        "200":
          description: Updated inventory request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryRequestResponse"
        "400":
          description: Invalid payload
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Inventory request or item not found
        "409":
          description: Conflict (invalid state or item overlap)

  /inventory-requests/{requestID}/submit:
    post:
      summary: Submit inventory draft to materially responsible user
      parameters:
        - $ref: "#/components/parameters/RequestID"
      responses:
        "200":
          description: Submitted inventory request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryRequestResponse"
        "400":
          description: Invalid request
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Inventory request not found
        "409":
          description: Conflict (invalid state)

  /inventory-requests/{requestID}/items/{itemID}/scan:
    post:
      summary: Scan inventory item by QR payload
      parameters:
        - $ref: "#/components/parameters/RequestID"
        - $ref: "#/components/parameters/ItemID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InventoryScanPayload"
      responses:
        "200":
          description: Updated inventory request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryRequestResponse"
        "400":
          description: Invalid payload
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Inventory request or item not found
        "409":
          description: Conflict (invalid state or scan mismatch)

  /inventory-requests/{requestID}/mrp-complete:
    post:
      summary: Complete inventory request by materially responsible user
      parameters:
        - $ref: "#/components/parameters/RequestID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InventoryMRPCompletePayload"
      responses:
        "200":
          description: Inventory request completed by MRP
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryRequestResponse"
        "400":
          description: Invalid payload
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Inventory request not found
        "409":
          description: Conflict (invalid state or incomplete scans for success)

  /inventory-requests/{requestID}/final-approve:
    post:
      summary: Final approve inventory request by creator accountant
      parameters:
        - $ref: "#/components/parameters/RequestID"
      responses:
        "200":
          description: Finalized inventory request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryRequestResponse"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Inventory request not found
        "409":
          description: Conflict (invalid state transition)

  /items/{itemID}/grab:
    post:
      summary: Grab item (request/approve flow)
      parameters:
        - $ref: "#/components/parameters/ItemID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GrabItemRequest"
      responses:
        "200":
          description: User item assignment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserItem"
        "400":
          description: Invalid payload
        "401":
          description: Unauthorized
        "404":
          description: Item or approver not found
        "409":
          description: Conflict (already grabbed or missing responsible user)

  /items/{itemID}/broken:
    post:
      summary: Mark item as broken
      parameters:
        - $ref: "#/components/parameters/ItemID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MoveItemToBrokenRequest"
      responses:
        "200":
          description: Broken item record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrokenItem"
        "400":
          description: Invalid payload
        "401":
          description: Unauthorized
        "403":
          description: Forbidden (role required)
        "404":
          description: Item or location not found

  /item-categories/counts:
    get:
      summary: Get item counts by category
      responses:
        "200":
          description: Item counts by category
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ItemCategoryItemsCountResponse"
        "401":
          description: Unauthorized

  /user-items:
    get:
      summary: List user item assignments
      responses:
        "200":
          description: User items list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserItem"
        "401":
          description: Unauthorized
    post:
      summary: Create item assignment request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserItemRequest"
      responses:
        "200":
          description: Created/returned assignment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserItem"
        "400":
          description: Invalid payload
        "401":
          description: Unauthorized
        "404":
          description: Item or target approver not found
        "409":
          description: Conflict

  /user-items/incoming:
    get:
      summary: Incoming assignment/transfer requests for approver
      responses:
        "200":
          description: Incoming requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserItem"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden (role required)

  /user-items/return:
    post:
      summary: Return assigned item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReturnUserItemRequest"
      responses:
        "200":
          description: Returned
        "401":
          description: Unauthorized
        "404":
          description: Item or assignment not found
        "409":
          description: Conflict

  /user-items/transfer-request:
    post:
      summary: Request transfer to another materially responsible user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransferUserItemRequest"
      responses:
        "200":
          description: Transfer requested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserItem"
        "400":
          description: Invalid payload
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Target user or assignment not found

  /user-items/transfer:
    post:
      summary: Direct transfer (accountant/admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransferUserItemRequest"
      responses:
        "200":
          description: Transferred
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserItem"
        "400":
          description: Invalid payload
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Target user or assignment not found

  /user-items/{userItemID}:
    get:
      summary: Get user item by ID
      parameters:
        - $ref: "#/components/parameters/UserItemID"
      responses:
        "200":
          description: User item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserItem"
        "400":
          description: Invalid userItemID
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: User item not found
    put:
      summary: Update user item metadata (touch)
      parameters:
        - $ref: "#/components/parameters/UserItemID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserItemRequest"
      responses:
        "200":
          description: Updated user item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserItem"
        "400":
          description: Invalid userItemID
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: User item not found
    delete:
      summary: Delete user item assignment
      parameters:
        - $ref: "#/components/parameters/UserItemID"
      responses:
        "204":
          description: Deleted
        "400":
          description: Invalid userItemID
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: User item not found

  /user-items/{userItemID}/approve:
    post:
      summary: Approve assignment/transfer request
      parameters:
        - $ref: "#/components/parameters/UserItemID"
      responses:
        "200":
          description: Approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserItem"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: User item not found
        "409":
          description: Invalid request state

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: UUID

  parameters:
    ItemID:
      name: itemID
      in: path
      required: true
      schema:
        type: string
        format: uuid
    UserItemID:
      name: userItemID
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ItemIDQuery:
      name: id
      in: query
      required: false
      schema:
        type: string
        format: uuid
    Query:
      name: query
      in: query
      required: false
      schema:
        type: string
    Name:
      name: name
      in: query
      required: false
      schema:
        type: string
    Number:
      name: number
      in: query
      required: false
      schema:
        type: string
    ResponsibleUserIDQuery:
      name: responsibleUserID
      in: query
      required: false
      schema:
        type: string
        format: uuid
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
    Per:
      name: per
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
    RequestID:
      name: requestID
      in: path
      required: true
      schema:
        type: string
        format: uuid
    JournalPage:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
    JournalPer:
      name: per
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100

  schemas:
    EntityRef:
      type: object
      properties:
        id:
          type: string
          format: uuid
      additionalProperties: true

    UserRole:
      type: string
      enum: [employee, materially_responsible_person, accountant, admin]

    DashboardWidgetType:
      type: string
      enum: [balance_statics, grabbed_items]

    DashboardBalanceItemPayload:
      type: object
      required: [itemID, number, name, priceRub, accumulatedPriceRub]
      properties:
        itemID:
          type: string
          format: uuid
        number:
          type: string
        name:
          type: string
        priceRub:
          type: number
          format: double
          multipleOf: 0.01
        accumulatedPriceRub:
          type: number
          format: double
          multipleOf: 0.01

    DashboardWidgetPayload:
      type: object
      required: [totalBalanceRub, currency, items]
      properties:
        totalBalanceRub:
          type: number
          format: double
          multipleOf: 0.01
        currency:
          type: string
          enum: [RUB]
        items:
          type: array
          items:
            $ref: "#/components/schemas/DashboardBalanceItemPayload"

    DashboardWidgetResponse:
      type: object
      required: [type, order, isAvailable, payload]
      properties:
        type:
          $ref: "#/components/schemas/DashboardWidgetType"
        order:
          type: integer
          minimum: 1
        isAvailable:
          type: boolean
        payload:
          $ref: "#/components/schemas/DashboardWidgetPayload"
        grabbedItemsPayload:
          allOf:
            - $ref: "#/components/schemas/DashboardGrabbedItemsPayload"
          nullable: true

    DashboardGrabbedItemPayload:
      type: object
      required: [userItemID, itemID, number, name]
      properties:
        userItemID:
          type: string
          format: uuid
        itemID:
          type: string
          format: uuid
        number:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        priceRub:
          type: number
          format: double
          nullable: true
          multipleOf: 0.01
        grabbedAt:
          type: string
          format: date-time
          nullable: true

    DashboardGrabbedItemsPayload:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/DashboardGrabbedItemPayload"

    DashboardResponse:
      type: object
      required: [widgets]
      properties:
        widgets:
          type: array
          items:
            $ref: "#/components/schemas/DashboardWidgetResponse"

    UserPublic:
      type: object
      properties:
        id:
          type: string
          format: uuid
          nullable: true
        login:
          type: string
        fullName:
          type: string
        age:
          type: integer
        position:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"
      additionalProperties: true

    ItemCategory:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
      additionalProperties: true

    ItemCategoryItemsCountResponse:
      type: object
      required:
        - categoryName
        - itemsCount
      properties:
        categoryID:
          type: string
          format: uuid
          nullable: true
        categoryName:
          type: string
        itemsCount:
          type: integer
          minimum: 0

    ItemParameter:
      type: object
      properties:
        id:
          type: string
          format: uuid
        key:
          type: string
        value:
          type: string
      additionalProperties: true

    Item:
      type: object
      properties:
        id:
          type: string
          format: uuid
        number:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        priceRub:
          type: number
          format: double
          nullable: true
          multipleOf: 0.01
          description: Price in Russian rubles
        category:
          allOf:
            - $ref: "#/components/schemas/ItemCategory"
          nullable: true
        responsibleUser:
          $ref: "#/components/schemas/ItemResponsibleUserResponse"
          nullable: true
        parameters:
          type: array
          items:
            $ref: "#/components/schemas/ItemParameter"
      additionalProperties: true

    ItemResponsibleUserResponse:
      type: object
      required: [fullName]
      properties:
        id:
          type: string
          format: uuid
          nullable: true
        fullName:
          type: string

    Location:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        kind:
          type: string
          enum: [warehouse, office]
        address:
          type: string
          nullable: true
        shelf:
          type: string
          nullable: true
        row:
          type: string
          nullable: true
        section:
          type: string
          nullable: true
      additionalProperties: true

    ItemLocation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        item:
          oneOf:
