openapi: 3.0.3
info:
  title: Diploma Backend Inventory API
  version: 1.0.0
servers:
  - url: http://localhost:8080
security:
  - bearerAuth: []

paths:
  /dashboard:
    get:
      summary: Get dashboard widgets
      responses:
        "200":
          description: Dashboard widgets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardResponse"
        "401":
          description: Unauthorized

  /items:
    get:
      summary: List items
      responses:
        "200":
          description: Items list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Item"
        "401":
          description: Unauthorized
    post:
      summary: Create item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateItemRequest"
      responses:
        "200":
          description: Created item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"
        "400":
          description: Invalid payload
        "401":
          description: Unauthorized
        "404":
          description: Category or responsible user not found

  /items/available_filters:
    get:
      summary: List available item filters
      responses:
        "200":
          description: Available filters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemAvailableFiltersResponse"
        "401":
          description: Unauthorized

  /items/search:
    get:
      summary: Search items by query params
      parameters:
        - $ref: "#/components/parameters/Query"
        - $ref: "#/components/parameters/Name"
        - $ref: "#/components/parameters/Number"
        - $ref: "#/components/parameters/ResponsibleUserIDQuery"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Per"
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ItemScanResponse"
        "400":
          description: Invalid query
        "401":
          description: Unauthorized
    post:
      summary: Search items by request body
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItemSearchQuery"
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ItemScanResponse"
        "400":
          description: Invalid query
        "401":
          description: Unauthorized

  /items/{itemID}:
    get:
      summary: Get full item details by ID
      parameters:
        - $ref: "#/components/parameters/ItemID"
      responses:
        "200":
          description: Full item details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemScanResponse"
        "400":
          description: Invalid itemID
        "401":
          description: Unauthorized
        "404":
          description: Item not found
    put:
      summary: Update item by ID
      parameters:
        - $ref: "#/components/parameters/ItemID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateItemRequest"
      responses:
        "200":
          description: Updated item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"
        "400":
          description: Invalid payload
        "401":
          description: Unauthorized
        "404":
          description: Item, category, or responsible user not found
    delete:
      summary: Delete item by ID
      parameters:
        - $ref: "#/components/parameters/ItemID"
      responses:
        "204":
          description: Deleted
        "400":
          description: Invalid itemID
        "401":
          description: Unauthorized
        "404":
          description: Item not found

  /items/{itemID}/journal:
    get:
      summary: Get item change journal
      parameters:
        - $ref: "#/components/parameters/ItemID"
        - $ref: "#/components/parameters/JournalPage"
        - $ref: "#/components/parameters/JournalPer"
      responses:
        "200":
          description: Item journal messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemJournalPageResponse"
        "400":
          description: Invalid query params
        "401":
          description: Unauthorized
        "404":
          description: Item not found

  /items/{itemID}/available_actions:
    get:
      summary: Get available item actions for current user
      parameters:
        - $ref: "#/components/parameters/ItemID"
      responses:
        "200":
          description: Available actions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemAvailableActionsResponse"
        "400":
          description: Invalid itemID
        "401":
          description: Unauthorized
        "404":
          description: Item not found

  /items/{itemID}/location:
    post:
      summary: Assign item location
      parameters:
        - $ref: "#/components/parameters/ItemID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetItemLocationRequest"
      responses:
        "200":
          description: Item location
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemLocation"
        "400":
          description: Invalid payload
        "401":
          description: Unauthorized
        "403":
          description: Forbidden (role required)
        "404":
          description: Item, location, or responsible user not found

  /items/{itemID}/grab:
    post:
      summary: Grab item (request/approve flow)
      parameters:
        - $ref: "#/components/parameters/ItemID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GrabItemRequest"
      responses:
        "200":
          description: User item assignment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserItem"
        "400":
          description: Invalid payload
        "401":
          description: Unauthorized
        "404":
          description: Item or approver not found
        "409":
          description: Conflict (already grabbed or missing responsible user)

  /items/{itemID}/broken:
    post:
      summary: Mark item as broken
      parameters:
        - $ref: "#/components/parameters/ItemID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MoveItemToBrokenRequest"
      responses:
        "200":
          description: Broken item record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrokenItem"
        "400":
          description: Invalid payload
        "401":
          description: Unauthorized
        "403":
          description: Forbidden (role required)
        "404":
          description: Item or location not found

  /user-items:
    get:
      summary: List user item assignments
      responses:
        "200":
          description: User items list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserItem"
        "401":
          description: Unauthorized
    post:
      summary: Create item assignment request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserItemRequest"
      responses:
        "200":
          description: Created/returned assignment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserItem"
        "400":
          description: Invalid payload
        "401":
          description: Unauthorized
        "404":
          description: Item or target approver not found
        "409":
          description: Conflict

  /user-items/incoming:
    get:
      summary: Incoming assignment/transfer requests for approver
      responses:
        "200":
          description: Incoming requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserItem"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden (role required)

  /user-items/return:
    post:
      summary: Return assigned item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReturnUserItemRequest"
      responses:
        "200":
          description: Returned
        "401":
          description: Unauthorized
        "404":
          description: Item or assignment not found
        "409":
          description: Conflict

  /user-items/transfer-request:
    post:
      summary: Request transfer to another materially responsible user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransferUserItemRequest"
      responses:
        "200":
          description: Transfer requested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserItem"
        "400":
          description: Invalid payload
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Target user or assignment not found

  /user-items/transfer:
    post:
      summary: Direct transfer (accountant/admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransferUserItemRequest"
      responses:
        "200":
          description: Transferred
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserItem"
        "400":
          description: Invalid payload
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Target user or assignment not found

  /user-items/{userItemID}:
    get:
      summary: Get user item by ID
      parameters:
        - $ref: "#/components/parameters/UserItemID"
      responses:
        "200":
          description: User item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserItem"
        "400":
          description: Invalid userItemID
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: User item not found
    put:
      summary: Update user item metadata (touch)
      parameters:
        - $ref: "#/components/parameters/UserItemID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserItemRequest"
      responses:
        "200":
          description: Updated user item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserItem"
        "400":
          description: Invalid userItemID
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: User item not found
    delete:
      summary: Delete user item assignment
      parameters:
        - $ref: "#/components/parameters/UserItemID"
      responses:
        "204":
          description: Deleted
        "400":
          description: Invalid userItemID
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: User item not found

  /user-items/{userItemID}/approve:
    post:
      summary: Approve assignment/transfer request
      parameters:
        - $ref: "#/components/parameters/UserItemID"
      responses:
        "200":
          description: Approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserItem"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: User item not found
        "409":
          description: Invalid request state

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: UUID

  parameters:
    ItemID:
      name: itemID
      in: path
      required: true
      schema:
        type: string
        format: uuid
    UserItemID:
      name: userItemID
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ItemIDQuery:
      name: id
      in: query
      required: false
      schema:
        type: string
        format: uuid
    Query:
      name: query
      in: query
      required: false
      schema:
        type: string
    Name:
      name: name
      in: query
      required: false
      schema:
        type: string
    Number:
      name: number
      in: query
      required: false
      schema:
        type: string
    ResponsibleUserIDQuery:
      name: responsibleUserID
      in: query
      required: false
      schema:
        type: string
        format: uuid
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
    Per:
      name: per
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
    JournalPage:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
    JournalPer:
      name: per
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100

  schemas:
    EntityRef:
      type: object
      properties:
        id:
          type: string
          format: uuid
      additionalProperties: true

    UserRole:
      type: string
      enum: [employee, materially_responsible_person, accountant, admin]

    DashboardWidgetType:
      type: string
      enum: [balance_statics]

    DashboardWidgetPayload:
      type: object
      required: [totalBalanceRub, currency]
      properties:
        totalBalanceRub:
          type: number
          format: double
          multipleOf: 0.01
        currency:
          type: string
          enum: [RUB]

    DashboardWidgetResponse:
      type: object
      required: [type, order, isAvailable, payload]
      properties:
        type:
          $ref: "#/components/schemas/DashboardWidgetType"
        order:
          type: integer
          minimum: 1
        isAvailable:
          type: boolean
        payload:
          $ref: "#/components/schemas/DashboardWidgetPayload"

    DashboardResponse:
      type: object
      required: [widgets]
      properties:
        widgets:
          type: array
          items:
            $ref: "#/components/schemas/DashboardWidgetResponse"

    UserPublic:
      type: object
      properties:
        id:
          type: string
          format: uuid
          nullable: true
        login:
          type: string
        fullName:
          type: string
        age:
          type: integer
        position:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"
      additionalProperties: true

    ItemCategory:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
      additionalProperties: true

    ItemParameter:
      type: object
      properties:
        id:
          type: string
          format: uuid
        key:
          type: string
        value:
          type: string
      additionalProperties: true

    Item:
      type: object
      properties:
        id:
          type: string
          format: uuid
        number:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        priceRub:
          type: number
          format: double
          nullable: true
          multipleOf: 0.01
          description: Price in Russian rubles
        category:
          allOf:
            - $ref: "#/components/schemas/ItemCategory"
          nullable: true
        responsibleUser:
          oneOf:
            - $ref: "#/components/schemas/EntityRef"
            - $ref: "#/components/schemas/UserPublic"
          nullable: true
        parameters:
          type: array
          items:
            $ref: "#/components/schemas/ItemParameter"
      additionalProperties: true

    Location:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        kind:
          type: string
          enum: [warehouse, office]
        address:
          type: string
          nullable: true
        shelf:
          type: string
          nullable: true
        row:
          type: string
          nullable: true
        section:
          type: string
          nullable: true
      additionalProperties: true

    ItemLocation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        item:
          oneOf:
            - $ref: "#/components/schemas/EntityRef"
            - $ref: "#/components/schemas/Item"
        location:
          oneOf:
            - $ref: "#/components/schemas/EntityRef"
            - $ref: "#/components/schemas/Location"
        createdAt:
          type: string
          format: date-time
          nullable: true
        updatedAt:
          type: string
          format: date-time
          nullable: true
      additionalProperties: true

    BrokenItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        item:
          $ref: "#/components/schemas/EntityRef"
        location:
          $ref: "#/components/schemas/EntityRef"
        quantity:
          type: integer
        reportedAt:
          type: string
          format: date-time
        reason:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
      additionalProperties: true

    UserItemStatus:
      type: string
      enum: [requested, transfer_requested, approved]

    UserItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user:
          oneOf:
            - $ref: "#/components/schemas/EntityRef"
            - $ref: "#/components/schemas/UserPublic"
        item:
          oneOf:
            - $ref: "#/components/schemas/EntityRef"
            - $ref: "#/components/schemas/Item"
        status:
          $ref: "#/components/schemas/UserItemStatus"
        approvedByUserID:
          type: string
          format: uuid
          nullable: true
        requestedToUserID:
          type: string
          format: uuid
          nullable: true
        grabbedAt:
          type: string
          format: date-time
          nullable: true
      additionalProperties: true

    ItemCurrentLocationInfo:
      type: object
      required: [location]
      properties:
        location:
          $ref: "#/components/schemas/Location"

    UserGrabInfo:
      type: object
      required: [user, name]
      properties:
        user:
          $ref: "#/components/schemas/UserPublic"
        name:
          type: string
        grabbedAt:
          type: string
          format: date-time
          nullable: true

    ItemScanResponse:
      type: object
      required: [item, locations, isBroken, isGrabbed]
      properties:
        item:
          $ref: "#/components/schemas/Item"
        categoryName:
          type: string
          nullable: true
        locations:
          type: array
          items:
            $ref: "#/components/schemas/Location"
        currentLocation:
          allOf:
            - $ref: "#/components/schemas/ItemCurrentLocationInfo"
          nullable: true
        isBroken:
          type: boolean
        isGrabbed:
          type: boolean
        grabbedBy:
          allOf:
            - $ref: "#/components/schemas/UserGrabInfo"
          nullable: true

    ItemResponsibleUserFilter:
      type: object
      properties:
        id:
          type: string
          format: uuid
          nullable: true
        fullName:
          type: string
      required: [fullName]

    ItemAvailableFiltersResponse:
      type: object
      required: [materiallyResponsiblePersons]
      properties:
        materiallyResponsiblePersons:
          type: array
          items:
            $ref: "#/components/schemas/ItemResponsibleUserFilter"

    ItemAvailableActionFlags:
      type: object
      required: [grabDirect, grabRequest, setLocationDirect, setLocationRequest, moveToBroken, returnItem]
      properties:
        grabDirect:
          type: boolean
        grabRequest:
          type: boolean
        setLocationDirect:
          type: boolean
        setLocationRequest:
          type: boolean
        moveToBroken:
          type: boolean
        returnItem:
          type: boolean

    ItemAvailableAction:
      type: string
      enum:
        - grab_direct
        - grab_request
        - set_location_direct
        - set_location_request
        - move_to_broken
        - return_item

    ItemAvailableActionsResponse:
      type: object
      required: [itemID, currentUserID, currentUserRole, actions, availableActions]
      properties:
        itemID:
          type: string
          format: uuid
        currentUserID:
          type: string
          format: uuid
        currentUserRole:
          $ref: "#/components/schemas/UserRole"
        materiallyResponsiblePersonID:
          type: string
          format: uuid
          nullable: true
        actions:
          $ref: "#/components/schemas/ItemAvailableActionFlags"
        availableActions:
          type: array
          items:
            $ref: "#/components/schemas/ItemAvailableAction"

    ItemJournalMessageResponse:
      type: object
      required: [id, createdAt, message]
      properties:
        id:
          type: string
          format: uuid
          nullable: true
        createdAt:
          type: string
          format: date-time
        message:
          type: string

    ItemJournalPageResponse:
      type: object
      required: [messages, page, per, total, totalPages, hasNext]
      properties:
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ItemJournalMessageResponse"
        page:
          type: integer
        per:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer
        hasNext:
          type: boolean

    CreateItemRequest:
      type: object
      required: [number, name, responsibleUserID]
      properties:
        number:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        priceRub:
          type: number
          format: double
          nullable: true
          multipleOf: 0.01
        categoryID:
          type: string
          format: uuid
          nullable: true
        responsibleUserID:
          type: string
          format: uuid

    UpdateItemRequest:
      type: object
      properties:
        number:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        priceRub:
          type: number
          format: double
          nullable: true
          multipleOf: 0.01
        categoryID:
          type: string
          format: uuid
          nullable: true
        responsibleUserID:
          type: string
          format: uuid
          nullable: true

    ItemSearchQuery:
      type: object
      properties:
        query:
          type: string
        name:
          type: string
        number:
          type: string
        responsibleUserID:
          type: string
          format: uuid
        page:
          type: integer
          minimum: 1
        per:
          type: integer
          minimum: 1

    SetItemLocationRequest:
      type: object
      required: [locationID]
      properties:
        locationID:
          type: string
          format: uuid
        responsibleUserID:
          type: string
          format: uuid
          nullable: true

    GrabItemRequest:
      type: object
      properties:
        requestedToUserID:
          type: string
          format: uuid
          nullable: true

    MoveItemToBrokenRequest:
      type: object
      required: [locationID, quantity]
      properties:
        locationID:
          type: string
          format: uuid
        quantity:
          type: integer
        reason:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true

    CreateUserItemRequest:
      type: object
      required: [itemID]
      properties:
        itemID:
          type: string
          format: uuid
        requestedToUserID:
          type: string
          format: uuid
          nullable: true

    UpdateUserItemRequest:
      type: object
      additionalProperties: false

    ReturnUserItemRequest:
      type: object
      required: [itemID]
      properties:
        itemID:
          type: string
          format: uuid

    TransferUserItemRequest:
      type: object
      required: [itemID, toUserID]
      properties:
        itemID:
          type: string
          format: uuid
        toUserID:
          type: string
          format: uuid
