openapi: 3.0.3
info:
  title: Diploma Backend Users API
  version: 1.0.0
servers:
  - url: http://localhost:8080
security:
  - bearerAuth: []
paths:
  /settings/users:
    get:
      summary: Admin settings users list
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Per"
      responses:
        "200":
          description: Users page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SettingsUsersPageResponse"
        "400":
          description: Invalid paging params
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /settings/users/{userID}/role:
    put:
      summary: Admin updates user role
      parameters:
        - $ref: "#/components/parameters/UserID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsUserRoleUpdateRequest"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPublic"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: User not found
        "409":
          description: User owns items and cannot be downgraded

  /settings/users/{userID}/items/add:
    post:
      summary: Admin assigns items to materially responsible user
      parameters:
        - $ref: "#/components/parameters/UserID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsUserItemsAddRequest"
      responses:
        "200":
          description: Items reassigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SettingsUserItemsOperationResponse"
        "400":
          description: Invalid payload
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: User or item not found
        "409":
          description: Target user role invalid

  /settings/users/{userID}/items/remove:
    post:
      summary: Admin reassigns items away from materially responsible user
      parameters:
        - $ref: "#/components/parameters/UserID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsUserItemsRemoveRequest"
      responses:
        "200":
          description: Items reassigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SettingsUserItemsOperationResponse"
        "400":
          description: Invalid payload
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: User or item not found
        "409":
          description: Source/target role invalid or source mismatch

  /users/{userID}:
    get:
      summary: Get current user profile by ID
      parameters:
        - $ref: "#/components/parameters/UserID"
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPublic"
        "400":
          description: Invalid userID
        "401":
          description: Unauthorize
        "403":
          description: Forbidden
        "404":
          description: User not found
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: UUID
  parameters:
    UserID:
      name: userID
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
    Per:
      name: per
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
  schemas:
    UserRole:
      type: string
      enum: [employee, materially_responsible_person, accountant, admin]

    UserPublic:
      type: object
      required:
        - id
        - login
        - fullName
        - age
        - position
      properties:
        id:
          type: string
          format: uuid
        login:
          type: string
        fullName:
          type: string
        age:
          type: integer
        position:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"

    Item:
      type: object
      properties:
        id:
          type: string
          format: uuid
        number:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        priceRub:
          type: number
          format: double
          nullable: true
        category:
          type: object
          nullable: true
        responsibleUser:
          type: object
          nullable: true
        parameters:
          type: array
          items:
            type: object
      additionalProperties: true

    SettingsUserRoleUpdateRequest:
      type: object
      required: [role]
      properties:
        role:
          $ref: "#/components/schemas/UserRole"

    SettingsUserItemsAddRequest:
      type: object
      required: [itemIDs]
      properties:
        itemIDs:
          type: array
          items:
            type: string
            format: uuid

    SettingsUserItemsRemoveRequest:
      type: object
      required: [itemIDs, reassignToUserID]
      properties:
        itemIDs:
          type: array
          items:
            type: string
            format: uuid
        reassignToUserID:
          type: string
          format: uuid

    SettingsUserRowResponse:
      type: object
      required: [user, assignedItems]
      properties:
        user:
          $ref: "#/components/schemas/UserPublic"
        assignedItems:
          type: array
          items:
            $ref: "#/components/schemas/Item"

    SettingsUsersPageResponse:
      type: object
      required: [users, page, per, total, totalPages, hasNext]
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/SettingsUserRowResponse"
        page:
          type: integer
        per:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer
        hasNext:
          type: boolean

    SettingsUserItemsOperationResponse:
      type: object
      required: [userID, items]
      properties:
        userID:
          type: string
          format: uuid
        items:
          type: array
          items:
            $ref: "#/components/schemas/Item"
